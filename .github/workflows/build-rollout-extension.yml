name: Build Rollout Extension Init Container - Push to ECR

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: argocd-rollout-extension
  IMAGE_TAG: v0.3.6
  EXTENSION_URL: https://github.com/argoproj-labs/rollout-extension/releases/download/v0.3.6/extension.tar

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download Rollout Extension JS
      run: |
        curl -L -o /tmp/extension.tar "$EXTENSION_URL"
        tar -xf /tmp/extension.tar -C /tmp
        cp /tmp/resources/extension-Rollout.js/extensions-Rollout.js rollout-extension/extensions-Rollout.js
        ls -lh rollout-extension/extensions-Rollout.js

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Create ECR repo if not exists
      run: |
        aws ecr describe-repositories --repository-names $ECR_REPOSITORY --region $AWS_REGION 2>/dev/null || \
        aws ecr create-repository --repository-name $ECR_REPOSITORY --region $AWS_REGION --image-scanning-configuration scanOnPush=false

    - name: Build, tag, and push image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build \
          --platform linux/amd64 \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
          -f rollout-extension/Dockerfile \
          rollout-extension/

        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    - name: Output image URI
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        echo "## Imagen publicada" >> $GITHUB_STEP_SUMMARY
        echo "- **Registry:** $ECR_REGISTRY/$ECR_REPOSITORY" >> $GITHUB_STEP_SUMMARY
        echo "- **Tag:** $IMAGE_TAG" >> $GITHUB_STEP_SUMMARY
