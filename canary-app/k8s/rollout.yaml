apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: canary-demo
  namespace: canary-demo
  labels:
    app: canary-demo
spec:
  replicas: 3
  revisionHistoryLimit: 5
  
  strategy:
    canary:
      # Canary deployment steps with progressive traffic shifting
      steps:
      # Step 1: Deploy canary with 10% traffic
      - setWeight: 10
      - pause: {duration: 30s}
      
      # Step 2: Run analysis at 10% traffic
      - analysis:
          templates:
          - templateName: canary-success-rate
            clusterScope: false
          args:
          - name: service-name
            value: canary-demo
      
      # Step 3: Increase to 25% traffic
      - setWeight: 25
      - pause: {duration: 30s}
      
      # Step 4: Run analysis at 25% traffic
      - analysis:
          templates:
          - templateName: canary-success-rate
            clusterScope: false
      
      # Step 5: Increase to 50% traffic
      - setWeight: 50
      - pause: {duration: 60s}
      
      # Step 6: Run analysis at 50% traffic
      - analysis:
          templates:
          - templateName: canary-success-rate
            clusterScope: false
          - templateName: canary-latency
            clusterScope: false
      
      # Step 7: Increase to 75% traffic
      - setWeight: 75
      - pause: {duration: 30s}
      
      # Step 8: Final analysis before full rollout
      - analysis:
          templates:
          - templateName: canary-success-rate
            clusterScope: false
      
      # Step 9: Manual approval gate (optional - can be removed for full automation)
      - pause: {}
      
      # Traffic routing configuration for Istio
      trafficRouting:
        istio:
          virtualService:
            name: canary-demo-vsvc
            routes:
            - primary
          destinationRule:
            name: canary-demo-dest-rule
            canarySubsetName: canary
            stableSubsetName: stable
      
      # Analysis configuration
      analysis:
        successfulRunHistoryLimit: 5
        unsuccessfulRunHistoryLimit: 5
  
  selector:
    matchLabels:
      app: canary-demo
  
  template:
    metadata:
      labels:
        app: canary-demo
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: canary-demo
        image: canary-demo:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: APP_VERSION
          value: "v1.0.0"
        - name: FAILURE_RATE
          valueFrom:
            configMapKeyRef:
              name: canary-demo-config
              key: FAILURE_RATE
        - name: LATENCY_MS
          valueFrom:
            configMapKeyRef:
              name: canary-demo-config
              key: LATENCY_MS
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: canary-demo-config
              key: PORT
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
